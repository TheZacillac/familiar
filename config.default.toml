# Familiar configuration
# Copy to ~/.familiar/config.toml and edit to taste.
# Environment variables override these values (see .env.example).

[model]
# LLM in provider:model format. Supported providers:
#   ollama:nemotron-3-nano:latest   (local, default)
#   openai:gpt-4o                   (requires OPENAI_API_KEY)
#   anthropic:claude-sonnet-4-20250514       (requires ANTHROPIC_API_KEY)
#   google_genai:gemini-2.5-pro     (requires GOOGLE_API_KEY)
default = "ollama:gemma4:31b"

[model.ollama]
base_url = "http://localhost:11434"

[storage]
# Base directory for Familiar data (database, exports, etc.)
data_dir = "~/.familiar"
# SQLite database filename (relative to data_dir)
db_name = "familiar.db"
# Directory for /export output
export_dir = "~/.familiar/exports"

[agent]
# Thread pool size for parallel tool calls.
# Seer's Rust core releases the GIL during I/O, so real parallelism is achieved.
max_workers = 12

[tracing]
# LangSmith observability (pip install -e ".[tracing]")
enabled = true
api_key = ""  # set your LangSmith API key here
project = "familiar"

# Catppuccin Mocha palette — override individual keys to restyle the REPL.
[theme]
info = "#8caaee"            # Blue
warning = "#e5c890"         # Yellow
error = "#e78284"           # Red
success = "#a6d189"         # Green
prompt = "bold #a6d189"     # Green (bold)
title = "bold #ca9ee6"      # Mauve (bold)
border = "#babbf1"          # Lavender
muted = "#a5adce"           # Subtext0
spinner = "#81c8be"         # Teal
accent = "#f4b8e4"          # Pink
peach = "#ef9f76"           # Peach
sky = "#99d1db"             # Sky
